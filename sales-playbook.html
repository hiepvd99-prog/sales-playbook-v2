<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Playbook — Vương Đắc Hiệp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50%       { opacity: .75; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-track {
      display: flex;
      width: max-content;
      animation: ticker 40s linear infinite;
    }
    .ticker-track:hover { animation-play-state: paused; }

    @keyframes goldPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(245,158,11,0.5); }
      50%       { box-shadow: 0 0 24px rgba(245,158,11,0.85), 0 0 48px rgba(245,158,11,0.2); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .animate-fadeIn  { animation: fadeIn 0.3s ease-out; }
    .vdh-glow        { animation: goldPulse 3s ease-in-out infinite; }

    /* ── Main content: transparent — shows body gradient through ── */
    .main-bg {
      background: transparent !important;
    }

    body {
      margin: 0; font-family: 'Be Vietnam Pro', sans-serif; overflow-x: hidden;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.28) 0%, transparent 62%),
        radial-gradient(ellipse 50% 40% at 95% 95%, rgba(139,92,246,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 5%  80%,  rgba(79,70,229,0.08)  0%, transparent 50%),
        linear-gradient(170deg, #0c0e16 0%, #0f1120 35%, #121526 65%, #0c0e16 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    * { box-sizing: border-box; }

    /* ── Scrollbar ─────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,.3); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.55); }

    /* ── VĐH monogram badge ─────────────────────── */
    .vdh-monogram {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      box-shadow: 0 0 0 2px rgba(245,158,11,.25), 0 4px 12px rgba(245,158,11,.35);
    }
    .vdh-name-text {
      background: linear-gradient(90deg, #FCD34D, #F59E0B, #FCD34D);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3.5s linear infinite;
    }
    .vdh-powered-badge {
      background: linear-gradient(90deg, rgba(245,158,11,.12), rgba(245,158,11,.04));
      border: 1px solid rgba(245,158,11,.22);
      border-radius: 99px;
      padding: 2px 10px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Sidebar nav active ──────────────────────── */
    .nav-active {
      color: #FCD34D !important;
    }
    .nav-active svg { color: #F59E0B !important; }

    /* ── iOS Glass sliding pill — Indigo theme ──── */
    .nav-pill {
      position: absolute;
      left: 10px; right: 10px;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(99,102,241,0.18) 0%, rgba(79,70,229,0.10) 100%);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(129,140,248,0.28);
      box-shadow:
        inset 0 1px 0 rgba(199,210,254,0.20),
        inset 0 -1px 0 rgba(0,0,0,0.10),
        0 4px 20px rgba(99,102,241,0.18),
        0 0 0 0.5px rgba(129,140,248,0.08);
      pointer-events: none;
      z-index: 0;
      transition:
        top    0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
        height 0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity 0.22s ease;
    }
    /* Gold left accent on active pill */
    .nav-pill::after {
      content: '';
      position: absolute;
      left: 0; top: 22%; bottom: 22%;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: linear-gradient(180deg, #fcd34d, #f59e0b);
      box-shadow: 0 0 8px rgba(245,158,11,0.6);
    }

    /* ── iOS cursor-tracking spotlight ──────────── */
    .nav-btn-ios {
      position: relative;
      overflow: hidden;
      border-radius: 13px;
      z-index: 1;
      transition: color 0.2s ease;
    }
    .nav-btn-ios::before {
      content: '';
      position: absolute;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, transparent 68%);
      left: var(--gx, 50%); top: var(--gy, 50%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease, width 0.25s ease, height 0.25s ease;
    }
    .nav-btn-ios:hover::before { opacity: 1; }
    .nav-btn-ios:active::before {
      width: 140px; height: 140px;
      opacity: 0.6;
    }

    /* ── Unified AI section skins ───────────────── */
    section[class*="bg-sky-50"],    section[class*="bg-fuchsia-50"],
    section[class*="bg-lime-50"],   section[class*="bg-emerald-50"],
    section[class*="bg-orange-50"], section[class*="bg-pink-50"],
    section[class*="bg-yellow-50"], section[class*="bg-purple-50"],
    section[class*="bg-amber-50"],  section[class*="bg-slate-800"],
    section[class*="bg-indigo-50"], section[class*="bg-teal-50"],
    section[class*="bg-red-50"],    section[class*="bg-rose-50"],
    section[class*="bg-slate-100"], section[class*="bg-cyan-50"] {
      background: linear-gradient(145deg, #13103b 0%, #181f54 100%) !important;
      border-color: rgba(99,102,241,.28) !important;
      box-shadow: 0 4px 32px rgba(99,102,241,.10), inset 0 1px 0 rgba(255,255,255,.04) !important;
    }
    /* headings */
    section[class*="bg-sky-50"] h3,    section[class*="bg-fuchsia-50"] h3,
    section[class*="bg-lime-50"] h3,   section[class*="bg-emerald-50"] h3,
    section[class*="bg-orange-50"] h3, section[class*="bg-pink-50"] h3,
    section[class*="bg-yellow-50"] h3, section[class*="bg-purple-50"] h3,
    section[class*="bg-amber-50"] h3,  section[class*="bg-slate-800"] h3,
    section[class*="bg-indigo-50"] h3, section[class*="bg-teal-50"] h3,
    section[class*="bg-red-50"] h3,    section[class*="bg-rose-50"] h3,
    section[class*="bg-slate-100"] h3, section[class*="bg-cyan-50"] h3 {
      color: #ffffff !important;
    }
    /* description text */
    section[class*="bg-sky-50"] > p,    section[class*="bg-fuchsia-50"] > p,
    section[class*="bg-lime-50"] > p,   section[class*="bg-emerald-50"] > p,
    section[class*="bg-orange-50"] > p, section[class*="bg-pink-50"] > p,
    section[class*="bg-yellow-50"] > p, section[class*="bg-purple-50"] > p,
    section[class*="bg-amber-50"] > p,  section[class*="bg-slate-800"] > p,
    section[class*="bg-indigo-50"] > p, section[class*="bg-teal-50"] > p,
    section[class*="bg-red-50"] > p,    section[class*="bg-rose-50"] > p,
    section[class*="bg-slate-100"] > p, section[class*="bg-cyan-50"] > p {
      color: rgba(199,210,254,.72) !important;
    }
    /* textarea & input inside AI sections */
    section[class*="bg-sky-50"]    textarea, section[class*="bg-fuchsia-50"] textarea,
    section[class*="bg-lime-50"]   textarea, section[class*="bg-emerald-50"] textarea,
    section[class*="bg-orange-50"] textarea, section[class*="bg-pink-50"]    textarea,
    section[class*="bg-yellow-50"] textarea, section[class*="bg-purple-50"] textarea,
    section[class*="bg-amber-50"]  textarea, section[class*="bg-indigo-50"] textarea,
    section[class*="bg-teal-50"]   textarea, section[class*="bg-red-50"]    textarea,
    section[class*="bg-rose-50"]   textarea, section[class*="bg-slate-100"] textarea,
    section[class*="bg-cyan-50"]   textarea,
    section[class*="bg-sky-50"]    input[type=text], section[class*="bg-fuchsia-50"] input[type=text],
    section[class*="bg-lime-50"]   input[type=text], section[class*="bg-emerald-50"] input[type=text],
    section[class*="bg-orange-50"] input[type=text], section[class*="bg-pink-50"]    input[type=text],
    section[class*="bg-yellow-50"] input[type=text], section[class*="bg-purple-50"] input[type=text],
    section[class*="bg-amber-50"]  input[type=text], section[class*="bg-indigo-50"] input[type=text],
    section[class*="bg-teal-50"]   input[type=text], section[class*="bg-red-50"]    input[type=text],
    section[class*="bg-rose-50"]   input[type=text], section[class*="bg-slate-100"] input[type=text],
    section[class*="bg-cyan-50"]   input[type=text] {
      background: rgba(255,255,255,.07) !important;
      border-color: rgba(99,102,241,.35) !important;
      color: #e2e8f0 !important;
    }
    /* placeholder */
    section[class*="bg-sky-50"]    textarea::placeholder, section[class*="bg-fuchsia-50"] textarea::placeholder,
    section[class*="bg-lime-50"]   textarea::placeholder, section[class*="bg-emerald-50"] textarea::placeholder,
    section[class*="bg-orange-50"] textarea::placeholder, section[class*="bg-pink-50"]    textarea::placeholder,
    section[class*="bg-yellow-50"] textarea::placeholder, section[class*="bg-purple-50"] textarea::placeholder,
    section[class*="bg-amber-50"]  textarea::placeholder, section[class*="bg-indigo-50"] textarea::placeholder,
    section[class*="bg-teal-50"]   textarea::placeholder, section[class*="bg-red-50"]    textarea::placeholder,
    section[class*="bg-rose-50"]   textarea::placeholder, section[class*="bg-slate-100"] textarea::placeholder,
    section[class*="bg-cyan-50"]   textarea::placeholder,
    section[class*="bg-sky-50"]    input::placeholder, section[class*="bg-fuchsia-50"] input::placeholder,
    section[class*="bg-lime-50"]   input::placeholder, section[class*="bg-emerald-50"] input::placeholder,
    section[class*="bg-orange-50"] input::placeholder, section[class*="bg-pink-50"]    input::placeholder,
    section[class*="bg-yellow-50"] input::placeholder, section[class*="bg-purple-50"] input::placeholder,
    section[class*="bg-amber-50"]  input::placeholder, section[class*="bg-indigo-50"] input::placeholder,
    section[class*="bg-teal-50"]   input::placeholder, section[class*="bg-red-50"]    input::placeholder,
    section[class*="bg-rose-50"]   input::placeholder, section[class*="bg-slate-100"] input::placeholder,
    section[class*="bg-cyan-50"]   input::placeholder {
      color: rgba(148,163,184,.45) !important;
    }

    /* ── AI button unified (purple-indigo gradient) ── */
    section[class*="bg-sky-50"]    button:not([title]):not(.absolute):not([class*="text-xs"]),
    section[class*="bg-fuchsia-50"] button:not([title]):not(.absolute),
    section[class*="bg-lime-50"]   button:not([title]):not(.absolute),
    section[class*="bg-emerald-50"] button:not([title]):not(.absolute),
    section[class*="bg-orange-50"] button:not([title]):not(.absolute),
    section[class*="bg-pink-50"]   button:not([title]):not(.absolute),
    section[class*="bg-yellow-50"] button:not([title]):not(.absolute),
    section[class*="bg-purple-50"] button:not([title]):not(.absolute),
    section[class*="bg-amber-50"]  button:not([title]):not(.absolute),
    section[class*="bg-indigo-50"] button:not([title]):not(.absolute),
    section[class*="bg-teal-50"]   button:not([title]):not(.absolute),
    section[class*="bg-red-50"]    button:not([title]):not(.absolute),
    section[class*="bg-rose-50"]   button:not([title]):not(.absolute),
    section[class*="bg-slate-100"] button:not([title]):not(.absolute),
    section[class*="bg-cyan-50"]   button:not([title]):not(.absolute) {
      background: linear-gradient(135deg, #6366f1, #4f46e5) !important;
      color: white !important;
      border: none !important;
      box-shadow: 0 4px 12px rgba(99,102,241,.35) !important;
    }
    section[class*="bg-sky-50"]    button:not([title]):not(.absolute):hover,
    section[class*="bg-fuchsia-50"] button:not([title]):not(.absolute):hover,
    section[class*="bg-lime-50"]   button:not([title]):not(.absolute):hover,
    section[class*="bg-emerald-50"] button:not([title]):not(.absolute):hover,
    section[class*="bg-orange-50"] button:not([title]):not(.absolute):hover,
    section[class*="bg-pink-50"]   button:not([title]):not(.absolute):hover,
    section[class*="bg-yellow-50"] button:not([title]):not(.absolute):hover,
    section[class*="bg-purple-50"] button:not([title]):not(.absolute):hover,
    section[class*="bg-amber-50"]  button:not([title]):not(.absolute):hover,
    section[class*="bg-indigo-50"] button:not([title]):not(.absolute):hover,
    section[class*="bg-teal-50"]   button:not([title]):not(.absolute):hover,
    section[class*="bg-red-50"]    button:not([title]):not(.absolute):hover,
    section[class*="bg-rose-50"]   button:not([title]):not(.absolute):hover,
    section[class*="bg-slate-100"] button:not([title]):not(.absolute):hover,
    section[class*="bg-cyan-50"]   button:not([title]):not(.absolute):hover {
      background: linear-gradient(135deg, #818cf8, #6366f1) !important;
      box-shadow: 0 6px 20px rgba(99,102,241,.5) !important;
    }
    button:disabled { opacity: .5 !important; cursor: not-allowed !important; }

    /* ── White card → luxury glass ─────────────── */
    .bg-white, .bg-white.rounded-xl {
      background: rgba(255,255,255,0.10) !important;
      backdrop-filter: blur(24px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
      border: 1px solid rgba(255,255,255,0.18) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 4px 28px rgba(0,0,0,0.22) !important;
      transition: all .22s ease !important;
    }
    .bg-white.rounded-xl:hover {
      background: rgba(255,255,255,0.15) !important;
      border-color: rgba(255,255,255,0.28) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 10px 36px rgba(0,0,0,0.28) !important;
      transform: translateY(-2px) !important;
    }

    /* ── Header → slate glass ──────────────────── */
    header {
      background: rgba(10,11,20,0.72) !important;
      backdrop-filter: blur(32px) saturate(200%) !important;
      -webkit-backdrop-filter: blur(32px) saturate(200%) !important;
      border-bottom: 1px solid rgba(129,140,248,0.12) !important;
      box-shadow: 0 1px 0 rgba(129,140,248,0.08), 0 4px 32px rgba(0,0,0,0.3) !important;
    }

    @media (max-width: 767px) {
      .mobile-sidebar-enter { transform: translateX(0) !important; }
    }

    /* ══ LIQUID GLASS GLOBAL OVERHAUL ═══════════════════════════════════ */

    /* App root transparent */
    #root > div { background: transparent !important; }

    /* Gray/slate light backgrounds → luxury glass */
    [class*="bg-gray-50"], [class*="bg-gray-100"],
    [class*="bg-slate-50"], [class*="bg-slate-100"],
    [class*="bg-blue-50"] {
      background: rgba(255,255,255,0.09) !important;
      backdrop-filter: blur(18px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(18px) saturate(160%) !important;
      border-color: rgba(255,255,255,0.14) !important;
    }

    /* ── Base: tất cả text trong app mặc định sáng ── */
    #root { color: rgba(226,232,240,0.93); }
    p, li, td, th, label, small { color: rgba(226,232,240,0.88) !important; }
    span { color: inherit; }

    /* ── Tailwind text overrides → tông sáng ──────── */
    .text-gray-900, .text-gray-800, .text-gray-700,
    .text-slate-900, .text-slate-800, .text-slate-700,
    .text-zinc-900,  .text-zinc-800,  .text-zinc-700 {
      color: rgba(255,255,255,0.95) !important;
    }
    .text-gray-600, .text-slate-600, .text-zinc-600 {
      color: rgba(226,232,240,0.88) !important;
    }
    .text-gray-500, .text-slate-500, .text-zinc-500 {
      color: rgba(203,213,225,0.85) !important;
    }
    .text-gray-400, .text-slate-400, .text-zinc-400 {
      color: rgba(203,213,225,0.75) !important;
    }
    .text-gray-300, .text-slate-300 {
      color: rgba(148,163,184,0.80) !important;
    }

    /* Màu accent → tông pastel sáng */
    .text-indigo-900, .text-indigo-800, .text-indigo-700,
    .text-indigo-600, .text-indigo-500 { color: #a5b4fc !important; }
    .text-blue-900, .text-blue-800, .text-blue-700,
    .text-blue-600, .text-blue-500     { color: #93c5fd !important; }
    .text-amber-900, .text-amber-800, .text-amber-700,
    .text-amber-600                    { color: #fde68a !important; }
    .text-orange-900, .text-orange-800, .text-orange-700 { color: #fed7aa !important; }
    .text-yellow-900, .text-yellow-800, .text-yellow-700 { color: #fef08a !important; }
    .text-green-900, .text-green-800, .text-green-700,
    .text-green-600                    { color: #86efac !important; }
    .text-emerald-900, .text-emerald-800, .text-emerald-700 { color: #6ee7b7 !important; }
    .text-teal-900, .text-teal-800, .text-teal-700    { color: #5eead4 !important; }
    .text-red-900, .text-red-800, .text-red-700,
    .text-red-600                      { color: #fca5a5 !important; }
    .text-rose-900, .text-rose-800, .text-rose-700    { color: #fda4af !important; }
    .text-purple-900, .text-purple-800, .text-purple-700,
    .text-purple-600                   { color: #d8b4fe !important; }
    .text-pink-900, .text-pink-800, .text-pink-700    { color: #f9a8d4 !important; }
    .text-cyan-900, .text-cyan-800, .text-cyan-700    { color: #67e8f9 !important; }
    .text-sky-900, .text-sky-800, .text-sky-700       { color: #7dd3fc !important; }
    .text-lime-900, .text-lime-800                    { color: #bef264 !important; }
    .text-fuchsia-900, .text-fuchsia-800              { color: #f0abfc !important; }
    .text-violet-900, .text-violet-800, .text-violet-700 { color: #c4b5fd !important; }

    h1, h2, h3, h4 { color: rgba(255,255,255,0.97) !important; }

    /* Font weight helpers */
    .font-semibold, .font-bold, .font-extrabold { color: inherit; }

    /* Number badge circles → glass */
    [class*="bg-blue-100"], [class*="bg-indigo-100"], [class*="bg-green-100"],
    [class*="bg-yellow-100"], [class*="bg-red-100"], [class*="bg-purple-100"],
    [class*="bg-orange-100"], [class*="bg-teal-100"], [class*="bg-pink-100"],
    [class*="bg-amber-100"], [class*="bg-emerald-100"] {
      background: rgba(255,255,255,0.12) !important;
    }

    /* Borders */
    [class*="border-gray-2"], [class*="border-gray-1"],
    [class*="border-slate-2"], [class*="border-indigo-1"],
    [class*="border-blue-2"] {
      border-color: rgba(255,255,255,0.11) !important;
    }

    /* AI sections → luxury dark glass */
    section[class*="bg-sky-50"],    section[class*="bg-fuchsia-50"],
    section[class*="bg-lime-50"],   section[class*="bg-emerald-50"],
    section[class*="bg-orange-50"], section[class*="bg-pink-50"],
    section[class*="bg-yellow-50"], section[class*="bg-purple-50"],
    section[class*="bg-amber-50"],  section[class*="bg-slate-800"],
    section[class*="bg-indigo-50"], section[class*="bg-teal-50"],
    section[class*="bg-red-50"],    section[class*="bg-rose-50"],
    section[class*="bg-slate-100"], section[class*="bg-cyan-50"] {
      background: rgba(22,20,70,0.72) !important;
      backdrop-filter: blur(24px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
      border: 1px solid rgba(99,102,241,0.28) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 6px 32px rgba(0,0,0,0.28) !important;
    }

    /* Bottom nav → slate indigo glass */
    nav.fixed.bottom-0 {
      background: rgba(9,10,18,0.85) !important;
      backdrop-filter: blur(32px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(32px) saturate(180%) !important;
      border-top: 1px solid rgba(99,102,241,0.15) !important;
    }

    /* Input / textarea */
    input[type="text"]:not([class*="bg-"]), textarea:not([class*="bg-"]) {
      background: rgba(255,255,255,0.08) !important;
      border-color: rgba(255,255,255,0.14) !important;
      color: #e2e8f0 !important;
    }

    /* Scrollbar for dark bg */

const NewsTicker = ({ apiKey }) => {
  const [news, setNews]       = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [updatedAt, setUpdatedAt] = React.useState('');

  const fetchNews = async () => {
    setLoading(true);
    const today = new Date().toISOString().split('T')[0];
    const cacheKey = `bds_news_${today}`;

    // 1. Dùng cache nếu đã fetch hôm nay
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const parsed = JSON.parse(cached);
        if (parsed.length > 0) {
          setNews(parsed);
          setUpdatedAt(new Date().toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' }));
          setLoading(false);
          return;
        }
      }
    } catch(_) {}

    // 2. Thử RSS feeds
    try {
      const results = await Promise.allSettled(
        RSS_FEEDS.map(url =>
          fetch(RSS2JSON + encodeURIComponent(url))
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        )
      );
      const items = results
        .filter(r => r.status === 'fulfilled' && r.value?.status === 'ok')
        .flatMap(r => (r.value.items || []).slice(0, 6))
        .map(it => {
          let host = 'cafef.vn';
          try { host = new URL(it.link).hostname; } catch(_) {}
          const pub = it.pubDate ? new Date(it.pubDate) : new Date();
          const diffH = Math.floor((Date.now() - pub) / 3600000);
          const time  = diffH < 1 ? 'Vừa xong' : diffH < 24 ? `${diffH}h trước` : pub.toLocaleDateString('vi-VN');
          return { title: it.title?.trim(), link: it.link, host, time };
        })
        .filter(it => it.title && it.title.length > 10)
        .slice(0, 20);

      if (items.length > 0) {
        setNews(items);
        setUpdatedAt(new Date().toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' }));
        try { localStorage.setItem(cacheKey, JSON.stringify(items)); } catch(_) {}
        setLoading(false);
        return;
      }
    } catch(_) {}

    // 3. Dùng Gemini tạo tin mới theo ngày
    if (apiKey) {
      try {
        const dateStr = new Date().toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
        const prompt = `Ngày ${dateStr}. Tạo 10 tiêu đề tin tức bất động sản Việt Nam thực tế, thời sự. Chủ đề đa dạng: giá nhà/căn hộ, lãi suất vay, chính sách BĐS, thị trường vùng ven, hạ tầng, dự án mới. Trả về JSON array duy nhất: [{"title":"...","host":"cafef.vn","time":"Hôm nay"}]. host chọn trong: cafef.vn, vnexpress.net, baodautu.vn, vneconomy.vn, tuoitre.vn. Chỉ JSON, không giải thích.`;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] }) });
        if (res.ok) {
          const json = await res.json();
          const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
